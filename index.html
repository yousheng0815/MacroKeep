<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html,
      body {
        margin: 0;
        background: #09090b;
      }
      /* First paint before JS/CSS bundles — wordmark only, no icon flash. */
      #pwa-launch {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: none;
        align-items: center;
        justify-content: center;
        background: #09090b;
        padding: max(1.5rem, env(safe-area-inset-top, 0px))
          max(1.5rem, env(safe-area-inset-right, 0px))
          max(1.5rem, env(safe-area-inset-bottom, 0px))
          max(1.5rem, env(safe-area-inset-left, 0px));
      }
      .pwa-launch__wordmark {
        width: min(78vw, 280px);
        height: auto;
        object-fit: contain;
      }
      @media (display-mode: standalone), (display-mode: fullscreen) {
        #pwa-launch {
          display: flex;
        }
        #root {
          visibility: hidden;
        }
      }
      body.app-ready #root {
        visibility: visible;
      }
    </style>
    <link rel="preload" as="image" href="/wordmark.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#09090B" />
    <meta
      name="description"
      content="Simple, free macro tracking with AI meal estimates. Your food log stays in Google Drive."
    />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MacroKeep" />
    <meta property="og:title" content="MacroKeep" />
    <meta
      property="og:description"
      content="Simple, free macro tracking with AI meal estimates. Your food log stays in Google Drive."
    />
    <meta property="og:image" content="%OG_IMAGE%" />
    <!-- og:url injected at build when MK_SITE_ORIGIN is set -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="MacroKeep" />
    <meta
      name="twitter:description"
      content="Simple, free macro tracking with AI meal estimates. Your food log stays in Google Drive."
    />
    <meta name="twitter:image" content="%OG_IMAGE%" />
    <title>MacroKeep</title>
    <link rel="preconnect" href="https://accounts.google.com" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-mk-bg antialiased">
    <div id="pwa-launch" class="pwa-launch" aria-hidden="true">
      <img
        class="pwa-launch__wordmark"
        src="/wordmark.png"
        alt=""
        width="1024"
        height="204"
        decoding="sync"
        fetchpriority="high"
      />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
